<!DOCTYPE html>
<html>
<head>
    <title>Loops</title>
</head>
<body>

<h2>For Loop</h2>
<script>
for (let i = 1; i <= 10; i++) {
    document.write(i + "<br>");
}
</script>

<h2>While Loop</h2>
<script>
let j = 1;
while (j <= 10) {
    document.write(j + "<br>");
    j++;
}
</script>

<h2>Do-While Loop</h2>
<script>
let k = 1;
do {
    document.write(k + "<br>");
    k++;
} while (k <= 10);
</script>

</body>
</html>
