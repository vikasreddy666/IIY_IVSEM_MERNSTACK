<!DOCTYPE html>
<html>
<head>
    <title>Fibonacci</title>
</head>
<body>

<h2>Fibonacci Series</h2>

<script>

function fibonacci(n) {
    let a = 0, b = 1;

    document.write(a + "<br>");
    document.write(b + "<br>");

    for (let i = 2; i < n; i++) {
        let c = a + b;
        document.write(c + "<br>");
        a = b;
        b = c;
    }
}

let n = parseInt(prompt("Enter number of terms:"));
fibonacci(n);

</script>

</body>
</html>
