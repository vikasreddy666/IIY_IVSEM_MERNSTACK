<!DOCTYPE html>
<html>
<head>
    <title>Factorial</title>
</head>
<body>

<h2>Factorial Program</h2>

<script>

function factorial(n) {
    let fact = 1;
    for (let i = 1; i <= n; i++) {
        fact *= i;
    }
    return fact;
}

let num = parseInt(prompt("Enter a number:"));
document.write("Factorial = " + factorial(num));

</script>

</body>
</html>
