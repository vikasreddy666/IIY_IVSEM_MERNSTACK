<!DOCTYPE html>
<html>
<head>
    <title>CSS Box Model</title>

    <style>
        .box {
            width: 200px;

            /* Content */
            background-color: lightblue;

            /* Padding */
            padding: 20px;

            /* Border */
            border: 5px solid black;

            /* Margin */
            margin: 30px;
        }
    </style>

</head>
<body>

<h2>CSS Box Model Example</h2>

<div class="box">
    This box shows content, padding, border, and margin.
</div>

</body>
</html>
