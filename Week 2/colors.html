<!DOCTYPE html>
<html>
<head>
    <title>CSS Colors</title>

    <!-- Internal CSS -->
    <style>
        .rgb { color: rgb(255, 0, 0); }
        .hex { color: #00FF00; }
        .name { color: blue; }
    </style>

</head>
<body>

<h2 style="color: purple;">Inline CSS (Purple)</h2>

<p class="rgb">RGB Color</p>
<p class="hex">HEX Color</p>
<p class="name">Named Color</p>

</body>
</html>
