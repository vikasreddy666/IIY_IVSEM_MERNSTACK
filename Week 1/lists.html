<!DOCTYPE html>
<html>
<head>
    <title>Lists Example</title>
</head>
<body>

<h2>Ordered List</h2>
<ol>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
</ol>

<h2>Unordered List</h2>
<ul>
    <li>Apple</li>
    <li>Banana</li>
</ul>

<h2>Nested List</h2>
<ul>
    <li>Frontend
        <ol>
            <li>HTML</li>
            <li>CSS</li>
        </ol>
    </li>
</ul>

<h2>Definition List</h2>
<dl>
    <dt>HTML</dt>
    <dd>Markup Language</dd>
</dl>

</body>
</html>
