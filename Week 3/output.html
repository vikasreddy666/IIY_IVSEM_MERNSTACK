<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Output</title>
</head>
<body>

<h2>JavaScript Output Methods</h2>

<p id="demo"></p>

<script>

    // document.write
    document.write("Using document.write <br>");

    // console.log
    console.log("Using console.log");

    // alert
    alert("Using alert box");

    // innerHTML
    document.getElementById("demo").innerHTML = "Using innerHTML";

</script>

</body>
</html>
