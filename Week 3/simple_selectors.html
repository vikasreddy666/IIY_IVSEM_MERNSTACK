<!DOCTYPE html>
<html>
<head>
    <title>Simple Selectors</title>
    <style>
        /* Element selector */
        h1 { color: red; }

        /* ID selector */
        #id1 { color: blue; }

        /* Class selector */
        .class1 { color: green; }

        /* Group selector */
        h2, p { color: purple; }

        /* Universal selector */
        * { font-family: Arial; }
    </style>
</head>
<body>

<h1>Element Selector</h1>
<h2>Group Selector</h2>
<p>Paragraph using group selector</p>

<p id="id1">ID Selector</p>
<p class="class1">Class Selector</p>

</body>
</html>
