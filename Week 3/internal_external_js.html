<!DOCTYPE html>
<html>
<head>
    <title>Internal & External JS</title>

    <!-- Internal JS -->
    <script>
        function internalFunction() {
            alert("This is Internal JavaScript");
        }
    </script>

</head>
<body>

<button onclick="internalFunction()">Internal JS</button>

<br><br>

<button onclick="externalFunction()">External JS</button>

<!-- External JS -->
<script src="script.js"></script>

</body>
</html>
